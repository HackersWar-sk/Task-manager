<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .login-box {
            background: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        input {
            padding: 8px;
            margin: 10px 0;
            width: 200px;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <input id="email" placeholder="Email"><br>
        <input id="password" type="password" placeholder="Password"><br>

        <button onclick="login()">Login</button>
    </div>

    <script src="./script.js"></script>

</body>

</html>
